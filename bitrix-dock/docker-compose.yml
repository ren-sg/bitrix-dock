services:
    nginx:
        build: 
            context: ./docker/nginx
            args:
                NGINX_VERSION: ${NGINX_VERSION}
        container_name: ${PROJECT_NAME}_nginx
        volumes:
            - ./www:/var/www
            - ./logs/nginx:/var/log/nginx
        depends_on:
            - php
        networks:
            - traefik-shared
        labels:
            - traefik.enable=true
            - traefik.http.routers.${PROJECT_NAME}_nginx.rule=Host(`${PROJECT_DOMAIN}`)
            - traefik.http.routers.${PROJECT_NAME}_nginx.entrypoints=http
            - traefik.http.services.${PROJECT_NAME}_nginx.loadbalancer.server.port=80

    php:
        build:
            context: ./docker/${PHP_VERSION}
            target: dev
        container_name: ${PROJECT_NAME}_php
        volumes:
            - ./www:/var/www
            - ./logs/php:/var/log/php
        networks:
            - traefik-shared
        extra_hosts:
            - "host.docker.internal:host-gateway"

    memcached:
        image: memcached:${MEMCACHED_VERSION}
        container_name: ${PROJECT_NAME}_memcached
        volumes:
            - ./logs/memcached:/var/log/memcached
        networks:
            - traefik-shared

    mysql:
        build: 
            context: ./docker/mysql
            args:
                MYSQL_VERSION: ${MYSQL_VERSION}
        container_name: ${PROJECT_NAME}_mysql
        volumes:
            - ./data/mysql-data:/var/lib/mysql
            - ./logs/mysql:/var/log/mysql
            - /etc/localtime:/etc/localtime/:ro
        environment:
            MYSQL_DATABASE: ${DB_NAME}
            MYSQL_USER: ${DB_USER}
            MYSQL_PASSWORD: ${DB_USER_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
        security_opt:
            - seccomp:unconfined
        networks:
            - traefik-shared

networks:
    traefik-shared:
        name: traefik-shared
        external: true
